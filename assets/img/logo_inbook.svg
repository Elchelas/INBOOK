<svg width="820" height="240" viewBox="0 0 820 240" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradientes libros -->
    <linearGradient id="bookBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"></stop>
      <stop offset="100%" stop-color="#2563EB"></stop>
    </linearGradient>

    <linearGradient id="bookPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"></stop>
      <stop offset="100%" stop-color="#7C3AED"></stop>
    </linearGradient>

    <linearGradient id="bookGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"></stop>
      <stop offset="100%" stop-color="#16A34A"></stop>
    </linearGradient>

    <linearGradient id="bookTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FACC15"></stop>
      <stop offset="100%" stop-color="#EAB308"></stop>
    </linearGradient>

    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="100%" stop-color="#22C55E"></stop>
    </linearGradient>
  </defs>

  <!-- I + N COMO LIBROS EN ESTANTE -->
  <g transform="translate(40,35)">

    <!-- i (libro con parte superior de otro color) -->
    <g>
      <!-- Parte superior (punto de la i) -->
      <rect x="0" y="0" width="24" height="18" rx="6" fill="url(#bookTop)"></rect>

      <!-- Cuerpo del libro -->
      <rect x="0" y="22" width="24" height="155" rx="6" fill="url(#bookBlue)"></rect>
    </g>

    <!-- N - libro izquierdo -->
    <rect x="48" y="25" width="26" height="150" rx="6" fill="url(#bookPurple)"></rect>

    <!-- N - libro derecho -->
    <rect x="160" y="25" width="26" height="150" rx="6" fill="url(#bookGreen)"></rect>

    <!-- N - libro central inclinado -->
    <rect x="104" y="30" width="26" height="155" rx="6" fill="url(#bookBlue)" transform="rotate(-14 117 108)"></rect>

  </g>

  <!-- TEXTO B -->
  <text x="260" y="155" font-family="Poppins, Montserrat, Inter, Arial, sans-serif" font-size="72" font-weight="700" fill="#0F172A">
    B
  </text>

  <!-- O = ENGRANE -->
  <g transform="translate(350,120)">
    <g fill="url(#gearGrad)">
      <rect x="-4" y="-38" width="8" height="12"></rect>
      <rect x="-4" y="26" width="8" height="12"></rect>
      <rect x="-38" y="-4" width="12" height="8"></rect>
      <rect x="26" y="-4" width="12" height="8"></rect>

      <rect x="-30" y="-30" width="10" height="10" transform="rotate(45)"></rect>
      <rect x="20" y="-30" width="10" height="10" transform="rotate(45)"></rect>
      <rect x="-30" y="20" width="10" height="10" transform="rotate(45)"></rect>
      <rect x="20" y="20" width="10" height="10" transform="rotate(45)"></rect>
    </g>

    <circle r="32" fill="url(#gearGrad)"></circle>
    <circle r="14" fill="#FFFFFF"></circle>
  </g>

  <!-- TEXTO OK -->
  <text x="395" y="155" font-family="Poppins, Montserrat, Inter, Arial, sans-serif" font-size="72" font-weight="700" fill="#0F172A">
    OK
  </text>

</svg>
